<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link rel="stylesheet" href="./style.css" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <!-- Fonts - DECA - INTER -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Stats preview card component</title>
  </head>
  <body>
    <main class="main-container">
      <section class="stats-card">
        <div class="img-card"></div>

        <div class="stats">
          <h1>Get <span>insights</span> that help your business growth</h1>

          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Facere
            nulla et animi, non officia obcaecati rerum repellat error
            voluptatum harum?
          </p>

          <div class="stats-container">
            <div class="stats-item">
              <h3>10k+</h3>
              <p>Companies</p>
            </div>
            <div class="stats-item">
              <h3>314</h3>
              <p>Templates</p>
            </div>
            <div class="stats-item">
              <h3>12M+</h3>
              <p>Queries</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
